<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TechFix Admin — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #080b10;
      --bg2:      #0d1117;
      --bg3:      #161b23;
      --border:   #1e2530;
      --accent:   #0ea5e9;
      --accent2:  #06b6d4;
      --green:    #10b981;
      --red:      #ef4444;
      --text1:    #f0f4f8;
      --text2:    #8b9ab0;
      --text3:    #3d4f63;
      --font:     'Outfit', sans-serif;
      --mono:     'JetBrains Mono', monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text1);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* animated grid background */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.4;
    }
    .bg-glow {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(14,165,233,0.07) 0%, transparent 70%);
    }

    /* login card */
    .login-wrap {
      position: relative; z-index: 1;
      width: 420px;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(24px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .login-badge {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--mono); font-size: 11px; font-weight: 500;
      color: var(--accent); background: rgba(14,165,233,0.08);
      border: 1px solid rgba(14,165,233,0.2);
      border-radius: 6px; padding: 6px 12px;
      width: fit-content; margin: 0 auto 24px;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .login-badge::before {
      content: ''; width: 6px; height: 6px;
      background: var(--accent); border-radius: 50%;
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .login-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03);
    }

    .login-logo {
      text-align: center; margin-bottom: 32px;
    }
    .login-logo-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 16px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 24px; margin-bottom: 12px;
      box-shadow: 0 8px 24px rgba(14,165,233,0.3);
    }
    .login-title {
      font-size: 22px; font-weight: 800; letter-spacing: -0.3px;
    }
    .login-title span { color: var(--accent); }
    .login-sub {
      font-size: 13px; color: var(--text2); margin-top: 4px;
    }

    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--text2); text-transform: uppercase;
      letter-spacing: 0.06em; margin-bottom: 8px;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap i {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--text3); font-size: 14px; pointer-events: none;
    }
    .input-wrap input {
      width: 100%; padding: 12px 14px 12px 40px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text1);
      font-family: var(--font); font-size: 14px;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(14,165,233,0.1);
    }
    .input-wrap input::placeholder { color: var(--text3); }

    .btn-login {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; font-family: var(--font); font-size: 15px; font-weight: 700;
      border: none; border-radius: 10px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity 0.2s, transform 0.15s;
      margin-top: 8px;
    }
    .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }

    .login-hint {
      margin-top: 20px; padding: 14px 16px;
      background: rgba(14,165,233,0.05);
      border: 1px solid rgba(14,165,233,0.12);
      border-radius: 10px;
    }
    .login-hint p {
      font-size: 12px; color: var(--text2); line-height: 1.7;
    }
    .login-hint span { color: var(--accent); font-family: var(--mono); font-size: 11px; }

    .error-msg {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      color: #fca5a5; border-radius: 8px;
      padding: 10px 14px; font-size: 13px;
      margin-bottom: 16px; display: none;
      align-items: center; gap: 8px;
    }

    .back-link {
      text-align: center; margin-top: 20px;
      font-size: 13px; color: var(--text2);
    }
    .back-link a {
      color: var(--accent); text-decoration: none;
      font-weight: 600;
    }
    .back-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div class="login-wrap">
    <div class="login-badge">
      <span>Admin Access</span>
    </div>

    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-icon">⚡</div>
        <div class="login-title">Tech<span>Fix</span> Admin</div>
        <div class="login-sub">Control panel — authorised personnel only</div>
      </div>

      <div class="error-msg" id="errorMsg">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorText">Invalid credentials</span>
      </div>

      <div class="form-group">
        <label>Admin Username</label>
        <div class="input-wrap">
          <i class="fas fa-user-shield"></i>
          <input type="text" id="adminUser" placeholder="Enter username" autocomplete="off"/>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" id="adminPass" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()"/>
        </div>
      </div>

      <button class="btn-login" onclick="doLogin()">
        <i class="fas fa-sign-in-alt"></i> Sign In to Admin Panel
      </button>

      <div class="login-hint">
        <p>
          <strong style="color:var(--text1);">Demo credentials</strong><br/>
          Username: <span>admin</span> &nbsp;|&nbsp; Password: <span>techfix2026</span>
        </p>
      </div>
    </div>

    <div class="back-link">
      <a href="index.html"><i class="fas fa-arrow-left"></i> Back to TechFix website</a>
    </div>
  </div>

  <script>
    // Check if already logged in
    if (localStorage.getItem('tfAdmin')) {
      window.location.href = 'admin.html';
    }

    function doLogin() {
      const user = document.getElementById('adminUser').value.trim();
      const pass = document.getElementById('adminPass').value;
      const err  = document.getElementById('errorMsg');
      const errTxt = document.getElementById('errorText');

      // TODO (backend): Replace with api.adminLogin(user, pass)
      // Credentials should be validated server-side, never hard-coded
      const ADMIN_USER = 'admin';
      const ADMIN_PASS = 'techfix2026';

      if (!user || !pass) {
        errTxt.textContent = 'Please enter both username and password.';
        err.style.display = 'flex'; return;
      }

      if (user === ADMIN_USER && pass === ADMIN_PASS) {
        localStorage.setItem('tfAdmin', JSON.stringify({
          username: user, loginTime: new Date().toISOString()
        }));
        window.location.href = 'admin.html';
      } else {
        errTxt.textContent = 'Invalid username or password. Please try again.';
        err.style.display = 'flex';
      }
    }
  </script>
</body>
</html>
