<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TechFix — Track Your Repair</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Karla:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body data-page="track">

  <div id="topbar-mount"></div>
  <div id="navbar-mount"></div>

  <section class="section">
    <div class="container" style="max-width:760px;">
      <div class="page-hero" style="padding-top:0;text-align:left;">
        <h1 class="page-hero-title">Track Your Repair</h1>
        <p class="page-hero-subtitle">Enter your ticket ID to check your repair status</p>
      </div>
      <div class="status-tracker">
        <div class="track-search">
          <input type="text" class="form-control" placeholder="Enter ticket ID (e.g. TF-20260001)" id="trackInput"/>
          <button class="btn btn-primary" onclick="trackRepair()"><i class="fas fa-search"></i> Track</button>
        </div>
        <div id="trackResult" style="display:none;margin-top:24px;"></div>
        <div id="trackEmpty" style="text-align:center;padding:40px;color:var(--text2);">
          <i class="fas fa-clipboard-list" style="font-size:48px;color:var(--text3);display:block;margin-bottom:16px;"></i>
          <p>Enter your ticket ID above to see your repair status</p>
          <p style="font-size:13px;margin-top:8px;">Tip: Try <strong style="color:var(--accent);">TF-20260001</strong> as a demo</p>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-mount"></div>
  <div id="modals-mount"></div>

  <script src="components.js"></script>
  <script src="main.js"></script>
</body>
</html>
