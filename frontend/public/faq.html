<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TechFix — FAQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Karla:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="/frontend/style/styles.css"/>
</head>
<body data-page="faq">

  <div id="topbar-mount"></div>
  <div id="navbar-mount"></div>

  <section class="section">
    <div class="container">
      <div class="section-header">
        <div class="section-label">Help Center</div>
        <h1 class="section-title">Frequently Asked Questions</h1>
        <p class="section-subtitle">Find answers to common questions about our products and services</p>
      </div>
      <div class="faq-categories">
        <div class="cat-tab active" onclick="setFaqCat(this,'all')">All</div>
        <div class="cat-tab" onclick="setFaqCat(this,'orders')">Orders & Delivery</div>
        <div class="cat-tab" onclick="setFaqCat(this,'repairs')">Repairs</div>
        <div class="cat-tab" onclick="setFaqCat(this,'payments')">Payments</div>
        <div class="cat-tab" onclick="setFaqCat(this,'returns')">Returns & Warranty</div>
      </div>
      <div class="faq-wrap" id="faqList"></div>
    </div>
  </section>

  <div id="footer-mount"></div>
  <div id="modals-mount"></div>

  <script src="/frontend/script/components.js"></script>
  <script src="/frontend/script/main.js"></script>
</body>
</html>
